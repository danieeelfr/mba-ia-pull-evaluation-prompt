name: Prompt Evaluation

on:
  pull_request:
    branches:
      - main
  issue_comment:
    types: [created]

jobs:
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run validation tests
        run: make test

  prompt-evaluation-tests:
    name: Prompt Evaluation Tests
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'issue_comment' &&
      github.event.issue.pull_request != null &&
      contains(github.event.comment.body, '/validate')

    steps:
      - name: Checkout PR code
        uses: actions/checkout@v4
        with:
          ref: 'refs/pull/${{ github.event.issue.number }}/head'

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Create .env file
        run: |
          cat > .env << ENVEOF
          LANGSMITH_API_KEY=${{ secrets.LANGSMITH_API_KEY }}
          LANGSMITH_PROJECT=${{ secrets.LANGSMITH_PROJECT }}
          LANGCHAIN_TRACING_V2=true
          USERNAME_LANGSMITH_HUB=${{ secrets.USERNAME_LANGSMITH_HUB }}
          LLM_PROVIDER=google
          LLM_MODEL=gemini-1.5-flash
          EVAL_MODEL=gemini-1.5-flash
          GOOGLE_API_KEY=${{ secrets.GOOGLE_API_KEY }}
          ENVEOF

      - name: Publish prompt to LangSmith Hub
        run: python src/push_prompts.py

      - name: Run automatic evaluation
        run: python src/evaluate.py

  notify:
    name: Result
    runs-on: ubuntu-latest
    needs: [prompt-evaluation-tests]
    if: always()

    steps:
      - name: Approved
        if: needs.prompt-evaluation-tests.result == 'success'
        run: echo "✅ All metrics >= 0.9 — Prompt approved!"

      - name: Failed
        if: needs.prompt-evaluation-tests.result == 'failure'
        run: |
          echo "❌ Some metric was below 0.9 — Review the prompt."
          exit 1
