name: Avaliação do Prompt

on:
  push:
  issue_comment:
    types: [created]
  workflow_dispatch:

jobs:
  test:
    name: Testes de Validação
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Instalar dependências
        run: pip install -r requirements.txt

      - name: Rodar testes de validação
        run: pytest tests/test_prompts.py -v

  evaluate:
    name: Avaliar Prompt v2
    runs-on: ubuntu-latest
    needs: test
    if: |
      github.ref == 'refs/heads/main' ||
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'issue_comment' &&
       github.event.issue.pull_request != null &&
       contains(github.event.comment.body, '/evaluate'))

    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Instalar dependências
        run: pip install -r requirements.txt

      - name: Criar arquivo .env
        run: |
          cat > .env << ENVEOF
          LANGSMITH_API_KEY=${{ secrets.LANGSMITH_API_KEY }}
          LANGSMITH_PROJECT=${{ secrets.LANGSMITH_PROJECT }}
          LANGCHAIN_TRACING_V2=true
          USERNAME_LANGSMITH_HUB=${{ secrets.USERNAME_LANGSMITH_HUB }}
          LLM_PROVIDER=google
          LLM_MODEL=gemini-2.5-flash
          EVAL_MODEL=gemini-2.5-flash
          GOOGLE_API_KEY=${{ secrets.GOOGLE_API_KEY }}
          ENVEOF

      - name: Publicar prompt no LangSmith Hub
        run: python src/push_prompts.py

      - name: Rodar avaliação automática
        run: python src/evaluate.py

  notify:
    name: Resultado
    runs-on: ubuntu-latest
    needs: [test, evaluate]
    if: always()

    steps:
      - name: Aprovado
        if: needs.evaluate.result == 'success'
        run: echo "✅ Todas as métricas >= 0.9 — Prompt aprovado!"

      - name: Reprovado
        if: needs.evaluate.result == 'failure'
        run: |
          echo "❌ Alguma métrica ficou abaixo de 0.9 — Revise o prompt."
          exit 1
